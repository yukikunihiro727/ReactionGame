<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反射神経テスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>反射神経テスト</h1>

        <div id="gameArea">
            ClickまたはSpaceで開始
        </div>

        <h2 id="result"></h2>

        <button id="rankingBtn">ランキング表示</button>
		<!--<button id="refreshBtn">ランキング更新</button>-->
		
        <div id="rankingArea"></div>
		
		<div id="nameModal" class="modal">

		    <div class="modal-content">
		        <h2>ランキング登録</h2>

		        <p>名前を入力してください</p>

		        <input
		            type="text"
		            id="playerNameInput"
		            maxlength="20"
		            placeholder="名前">

		        <div class="modal-buttons">
		            <button id="saveBtn">登録</button>
		            <button id="cancelBtn">キャンセル</button>
		        </div>
		    </div>

		</div>
    </div>

    <script src="script.js"></script>

</body>
</html>
